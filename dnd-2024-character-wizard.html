<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DND 2024 · 角色创建</title>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Serif+SC:wght@400;600;700&family=Cinzel:wght@500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a24b;
  --gold-light: #e0c878;
  --gold-dark: #a07828;
  --gold-glow: rgba(201,162,75,0.25);
  --parchment: #d4c5a9;
  --parchment-muted: #b5a080;
  --text-dim: #7a6a55;
  --font-gothic: 'UnifrakturCook', cursive;
  --font-body: 'Crimson Text', serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-body);
  font-size: 16px;
  color: var(--parchment);
  background: #0d0704 no-repeat center center fixed;
  background-size: cover;
  display: flex; align-items: center; justify-content: flex-start;
  transition: background-image 800ms ease;
  position: relative;
  padding-left: 120px;
}

.noise-overlay {
  position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.028;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat; background-size: 300px 300px;
}

.bg-dim {
  position: fixed; inset: 0; z-index: 10;
  background: rgba(0,0,0,0.5);
  pointer-events: none;
  opacity: 0; transition: opacity 400ms ease;
}
.bg-dim.visible { opacity: 1; }

.start-screen {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: flex-start; gap: 40px;
}

.entries {
  display: flex; flex-direction: column; gap: 20px;
}

.entry {
  cursor: pointer; position: relative;
  padding: 20px 36px; min-width: 280px;
  text-align: center;
  transition: all 500ms ease;
}
.entry .zh {
  font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", serif; font-weight: 600;
  font-size: 34px; letter-spacing: 6px;
  color: var(--parchment-muted);
  transition: all 500ms ease;
}
.entry .sub {
  display: block;
  font-family: var(--font-body);
  font-size: 11px; letter-spacing: 3px; color: var(--text-dim);
  margin-top: 4px;
  transition: all 500ms ease;
}
.entry .line-top,
.entry .line-btm {
  width: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  transition: width 500ms ease; margin: 0 auto;
}

.entry:hover .zh {
  color: var(--gold);
  text-shadow: 0 0 8px var(--gold-glow), 0 0 24px var(--gold-glow), 0 0 40px rgba(201,162,75,0.15);
}
.entry:hover .sub { color: var(--parchment-muted); }
.entry:hover .line-top,
.entry:hover .line-btm { width: 100%; }

/* 背景切换 */
.bg-switcher {
  position: fixed; bottom: 24px; right: 24px; z-index: 100;
  display: flex; align-items: center; gap: 10px;
}
.bg-switcher button {
  font-family: var(--font-body);
  font-size: 13px; letter-spacing: 1px;
  padding: 6px 14px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  background: rgba(0,0,0,0.4);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 300ms ease;
}
.bg-switcher button:hover {
  border-color: var(--gold-dark);
  color: var(--parchment);
  box-shadow: 0 0 10px var(--gold-glow);
}
.bg-switcher .dot-row { display: flex; gap: 6px; }
.bg-switcher .dot {
  width: 8px; height: 8px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(0,0,0,0.3);
  transition: all 300ms ease;
}
.bg-switcher .dot.active {
  background: var(--gold-dark);
  border-color: var(--gold);
  box-shadow: 0 0 6px var(--gold-glow);
}
#btnAudio {
  font-size: 16px; padding: 4px 10px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 300ms ease;
}
#btnAudio:hover {
  border-color: var(--gold-dark);
  color: var(--parchment);
  box-shadow: 0 0 10px var(--gold-glow);
}
#btnAudio.muted { opacity: 0.5; }

/* 子选项 */
.sub-options {
  display: none; flex-direction: column; align-items: center; gap: 28px;
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 50;
}
.sub-options.visible { display: flex; }
.sub-windows { display: flex; gap: 24px; }

.sub-opt {
  cursor: pointer; position: relative;
  width: 420px; height: 520px;
  border: 1px solid rgba(210,173,104,0.16);
  border-radius: 6px;
  background:
    linear-gradient(90deg, transparent, rgba(210,173,104,0.06), transparent),
    rgba(0,0,0,0.16);
  display: flex; flex-direction: column; align-items: center;
  justify-content: flex-end; gap: 10px;
  padding: 48px 36px;
  transition: all 400ms ease;
  text-align: center;
}
.sub-opt:hover {
  border-color: var(--gold);
  background:
    linear-gradient(90deg, transparent, rgba(201,162,75,0.1), transparent),
    rgba(0,0,0,0.24);
  box-shadow: 0 0 36px var(--gold-glow);
}
.sub-opt .zh {
  position: relative; z-index: 1;
  font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", serif; font-weight: 600;
  font-size: 36px; letter-spacing: 0.12em; padding-left: 0.12em;
  color: var(--gold);
  text-shadow: 0 2px 8px rgba(0,0,0,0.86), 0 0 18px rgba(201,162,75,0.1);
  transition: all 400ms ease;
}
.sub-opt .desc {
  position: relative; z-index: 1;
  font-size: 14px; color: var(--text-dim);
  line-height: 1.7; max-width: 300px;
  transition: all 400ms ease;
}
.sub-opt:hover .zh {
  text-shadow: 0 2px 8px rgba(0,0,0,0.86), 0 0 24px var(--gold-glow), 0 0 44px rgba(201,162,75,0.2);
}
.sub-opt:hover .desc { color: var(--parchment-muted); }
.sub-opt .card-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 6px;
  opacity: 0.85;
  transition: opacity 400ms ease;
}
.sub-opt:hover .card-img { opacity: 1; }
.sub-opt .line-top,
.sub-opt .line-btm {
  width: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  transition: width 500ms ease; margin: 0 auto;
  position: absolute;
}
.sub-opt .line-top { top: 28px; }
.sub-opt .line-btm { bottom: 28px; }
.sub-opt:hover .line-top,
.sub-opt:hover .line-btm { width: 240px; }

#subBack .zh { font-size: 24px; letter-spacing: 4px; }
#subBack { padding: 14px 32px; min-width: auto; }

/* 种族选择 */
.race-screen {
  display: none; flex-direction: column; align-items: center; gap: 32px;
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 55;
}
.race-screen.visible { display: flex; }

.race-header { text-align: center; }
.race-title.zh {
  display: block;
  font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", serif; font-weight: 600;
  font-size: 28px; color: var(--gold);
  text-shadow: 0 2px 8px rgba(0,0,0,0.86), 0 0 18px rgba(201,162,75,0.1);
  letter-spacing: 0.08em;
}
.race-title.sub {
  display: block;
  font-family: "Cinzel", "Cormorant Garamond", Georgia, serif;
  font-size: 13px; color: var(--gold-dark);
  letter-spacing: 0.12em;
  margin-top: 4px;
}
.race-line {
  width: 180px; height: 1px;
  margin: 12px auto 0;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.race-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 18px;
}

.race-card {
  cursor: pointer;
  width: 220px; height: 360px;
  border: 1px solid rgba(210,173,104,0.18);
  border-radius: 4px;
  background: linear-gradient(180deg, rgba(210,173,104,0.04), rgba(0,0,0,0.2));
  display: flex; flex-direction: column; align-items: center;
  transition: all 350ms ease;
  position: relative;
  overflow: hidden;
}
.race-card:hover {
  border-color: var(--gold);
  box-shadow: 0 0 20px var(--gold-glow);
  transform: translateY(-3px);
}
.race-card.selected {
  border-color: var(--gold);
  box-shadow: 0 0 32px var(--gold-glow);
}

.race-card .race-img {
  width: 100%; height: 280px;
  background: rgba(255,255,255,0.02);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  position: relative;
}
.race-card .race-img-placeholder {
  font-size: 48px; opacity: 0.25;
  transition: opacity 350ms ease;
}
.race-card:hover .race-img-placeholder { opacity: 0.45; }
.race-card .race-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  position: absolute; inset: 0;
}

.race-card .race-info {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px;
  padding: 8px 6px;
}
.race-card .race-zh {
  font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", serif; font-weight: 600;
  font-size: 20px; color: var(--gold);
  transition: all 350ms ease;
}
.race-card .race-en {
  font-family: "Cinzel", "Cormorant Garamond", Georgia, serif;
  font-size: 12px; color: var(--text-dim);
  letter-spacing: 0.06em;
  transition: all 350ms ease;
}
.race-card:hover .race-en { color: var(--parchment-muted); }

#raceBack { padding: 12px 28px; min-width: auto; }
#raceBack .zh { font-size: 22px; letter-spacing: 4px; }

/* ============================================
   种族详情面板 — 16:9 宽幅
   ============================================ */
.race-detail-overlay {
  display: none;
  position: fixed; inset: 0;
  z-index: 60;
  background: rgba(0,0,0,0.65);
  align-items: center; justify-content: center;
}
.race-detail-overlay.visible { display: flex; }

.race-detail {
  width: 88vw; max-width: 1200px;
  aspect-ratio: 16 / 9;
  display: flex;
  border: 1px solid rgba(210,173,104,0.25);
  border-radius: 6px;
  background: #0d0704;
  overflow: hidden;
  box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 40px var(--gold-glow);
  position: relative;
  animation: detailIn 350ms ease;
}
@keyframes detailIn {
  from { opacity: 0; transform: scale(0.97); }
  to   { opacity: 1; transform: scale(1); }
}

/* 左 1/3：立绘 */
.race-detail-portrait {
  width: 44%;
  position: relative; flex-shrink: 0;
  background: #0a0502;
  overflow: hidden;
}
.race-detail-portrait img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
  position: absolute; inset: 0;
}
.race-detail-portrait .portrait-placeholder {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 72px; opacity: 0.12;
}
.race-detail-portrait .portrait-svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
}
.race-detail-portrait::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to right, transparent 88%, rgba(13,7,4,0.85) 100%);
  pointer-events: none; z-index: 1;
}

/* 右 2/3：内容 */
.race-detail-content {
  flex: 1;
  padding: 32px 38px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 16px;
}

.race-detail-content::-webkit-scrollbar { width: 4px; }
.race-detail-content::-webkit-scrollbar-track { background: transparent; }
.race-detail-content::-webkit-scrollbar-thumb { background: rgba(210,173,104,0.15); border-radius: 2px; }

.race-detail-zh {
  font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", serif; font-weight: 600;
  font-size: 32px; color: var(--gold);
  letter-spacing: 0.08em;
}
.race-detail-en {
  font-family: "Cinzel", "Cormorant Garamond", Georgia, serif;
  font-size: 14px; color: var(--gold-dark);
  letter-spacing: 0.12em;
  margin-top: 2px;
}
.race-detail-meta {
  display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap;
}
.race-detail-meta span {
  font-size: 11px; color: var(--text-dim);
  border: 1px solid rgba(210,173,104,0.18);
  border-radius: 3px; padding: 2px 10px;
  letter-spacing: 0.05em;
}

/* 种族简介 */
.race-detail-flavor {
  font-family: var(--font-body);
  font-size: 14px; color: var(--parchment-muted);
  line-height: 1.7; font-style: italic;
  border-left: 2px solid rgba(210,173,104,0.3);
  padding-left: 14px;
  margin: 4px 0;
}

/* 分支选择区 */
.race-detail-branches {
  display: flex; gap: 10px; flex-wrap: wrap;
}
.race-branch-pill {
  cursor: pointer;
  font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", serif;
  font-size: 13px; color: var(--text-dim);
  border: 1px solid rgba(210,173,104,0.2);
  border-radius: 4px;
  padding: 7px 16px;
  background: rgba(0,0,0,0.2);
  transition: all 300ms ease;
}
.race-branch-pill:hover {
  border-color: var(--gold-dark);
  color: var(--parchment);
}
.race-branch-pill.selected {
  border-color: var(--gold);
  color: var(--gold);
  box-shadow: 0 0 14px var(--gold-glow);
  background: rgba(201,162,75,0.08);
}

/* 龙种颜色选择 */
.race-color-pills {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-top: 2px;
}
.race-color-pill {
  cursor: pointer;
  font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", serif;
  font-size: 12px; color: var(--text-dim);
  border: 1px solid rgba(210,173,104,0.15);
  border-radius: 3px;
  padding: 5px 12px;
  background: rgba(0,0,0,0.25);
  transition: all 300ms ease;
}
.race-color-pill:hover {
  border-color: var(--gold-dark);
  color: var(--parchment);
}
.race-color-pill.selected {
  border-color: var(--gold-light);
  color: var(--gold-light);
  box-shadow: 0 0 10px rgba(224,200,120,0.2);
  background: rgba(201,162,75,0.1);
}
.race-color-pill .damage-tag {
  font-size: 10px; color: var(--gold-dark);
  margin-left: 3px;
}
.race-color-pill.selected .damage-tag {
  color: var(--gold-light);
}

/* 特性列表 */
.race-detail-section {
  border-top: 1px solid rgba(210,173,104,0.12);
  padding-top: 12px;
}
.race-detail-section-title {
  font-family: "Cinzel", "Cormorant Garamond", Georgia, serif;
  font-size: 12px; color: var(--gold-dark);
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}

/* 特性条目（紧凑版 — hover 弹出详情） */
.trait-entry {
  cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  padding: 7px 12px;
  border: 1px solid transparent;
  border-radius: 3px;
  transition: all 200ms ease;
  position: relative;
}
.trait-entry:hover {
  border-color: rgba(210,173,104,0.22);
  background: rgba(201,162,75,0.05);
}
.trait-entry .trait-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--gold-dark);
  flex-shrink: 0;
  transition: all 200ms ease;
}
.trait-entry:hover .trait-dot {
  background: var(--gold);
  box-shadow: 0 0 6px var(--gold-glow);
}
.trait-entry .trait-entry-name {
  font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", serif; font-weight: 600;
  font-size: 14px; color: var(--parchment);
  transition: color 200ms ease;
}
.trait-entry:hover .trait-entry-name {
  color: var(--gold-light);
}
.trait-entry .trait-entry-en {
  font-size: 10px; color: var(--text-dim);
  letter-spacing: 0.04em;
  margin-left: auto;
  transition: color 200ms ease;
}
.trait-entry.sub {
  padding-left: 28px;
}
.trait-entry.sub .trait-dot {
  width: 3px; height: 3px;
  opacity: 0.6;
}
.trait-entry.sub .trait-entry-name {
  font-size: 13px;
  font-weight: 500;
}
.trait-entry.sub .trait-entry-en {
  font-size: 9px;
}
.trait-unlock-badge {
  font-family: "Cinzel", "Cormorant Garamond", Georgia, serif;
  font-size: 9px; color: var(--gold-dark);
  background: rgba(201,162,75,0.08);
  border: 1px solid rgba(201,162,75,0.18);
  border-radius: 2px;
  padding: 1px 5px;
  line-height: 1.4;
  flex-shrink: 0;
}
.trait-entry:hover .trait-entry-en {
  color: var(--parchment-muted);
}

/* BG3 风格特性弹出卡 */
.trait-popup {
  width: 420px;
  padding: 0;
  background:
    linear-gradient(180deg, rgba(18,8,3,0.98), rgba(8,4,1,0.98));
  border: 1px solid rgba(210,173,104,0.35);
  border-radius: 6px;
  box-shadow:
    0 0 0 6px rgba(0,0,0,0.3),
    0 12px 48px rgba(0,0,0,0.8),
    0 0 24px rgba(201,162,75,0.08);
  white-space: normal;
  position: relative;
}
.trait-popup-header {
  padding: 14px 18px 10px;
}
.trait-popup-header .popup-name {
  font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", serif; font-weight: 600;
  font-size: 19px; color: var(--gold);
  letter-spacing: 0.06em;
}
.trait-popup-header .popup-en {
  font-family: "Cinzel", "Cormorant Garamond", Georgia, serif;
  font-size: 11px; color: var(--gold-dark);
  letter-spacing: 0.08em;
  margin-top: 1px;
}
.popup-type-tag {
  display: inline-block; vertical-align: middle;
  font-family: "Noto Serif SC", "Source Han Serif SC", serif;
  font-size: 10px; font-weight: 400;
  letter-spacing: 0.06em;
  margin-left: 8px;
  padding: 1px 7px;
  border-radius: 3px;
}
.popup-type-tag.tag-passive {
  color: var(--text-dim);
  border: 1px solid rgba(210,173,104,0.18);
  background: rgba(0,0,0,0.2);
}
.popup-type-tag.tag-active {
  color: var(--gold-light);
  border: 1px solid rgba(210,173,104,0.3);
  background: rgba(201,162,75,0.08);
}
.popup-type-tag.tag-spell {
  color: #88b8e8;
  border: 1px solid rgba(136,184,232,0.3);
  background: rgba(136,184,232,0.06);
}
.popup-type-tag.tag-feat {
  color: #c9a87c;
  border: 1px solid rgba(201,168,124,0.3);
  background: rgba(201,168,124,0.06);
}
.trait-popup-divider {
  height: 1px; margin: 0 16px;
  background: linear-gradient(90deg, transparent, rgba(210,173,104,0.18), transparent);
}
.trait-popup-divider.thin {
  opacity: 0.4;
}

/* BG3 风格字段行：标签 + 值 */
.trait-popup-fields {
  padding: 6px 16px 8px;
  display: flex; flex-direction: column; gap: 3px;
}
.popup-field {
  display: flex; align-items: baseline; gap: 8px;
  font-size: 12px; line-height: 1.6;
}
.popup-field-label {
  font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", serif;
  color: var(--text-dim);
  min-width: 32px;
  flex-shrink: 0;
}
.popup-field-value {
  font-family: "Cinzel", "Cormorant Garamond", Georgia, serif;
  color: var(--parchment);
  letter-spacing: 0.04em;
}

.trait-popup-body {
  padding: 8px 16px 12px;
  font-size: 13px; color: var(--parchment-muted);
  line-height: 1.9;
}

/* 特性描述中的关键词高亮 */
.popup-keyword {
  color: var(--gold-light);
  font-weight: 600;
}

/* 特性描述中的小标题 */
.popup-subtitle {
  display: block;
  font-size: 12px;
  color: var(--gold-dark);
  font-weight: 600;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}

/* 成长表标题 */
.popup-scaling-label {
  display: block;
  font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", serif;
  font-size: 11px; color: var(--text-dim);
  padding: 0 16px 4px;
  letter-spacing: 0.06em;
}

.trait-popup-footer {
  padding: 6px 16px 10px;
  font-size: 11px; color: var(--text-dim);
  border-top: 1px solid rgba(210,173,104,0.08);
  margin: 0 16px;
}

/* 确认按钮 */
.race-detail-confirm {
  margin-top: auto;
  cursor: pointer;
  font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", serif; font-weight: 600;
  font-size: 16px; color: var(--gold);
  letter-spacing: 0.1em;
  border: 1px solid var(--gold-dark);
  border-radius: 4px;
  padding: 10px 30px;
  background: rgba(201,162,75,0.08);
  align-self: flex-end;
  transition: all 300ms ease;
}
.race-detail-confirm:hover {
  background: rgba(201,162,75,0.18);
  box-shadow: 0 0 20px var(--gold-glow);
}

/* 伤害成长标签 + hover 弹窗 */
/* 全局 tooltip 容器（body 级别透明壳，不受 overflow 裁切） */
.global-tooltip {
  position: fixed;
  pointer-events: none;
  opacity: 0;
  transition: opacity 180ms ease;
  z-index: 9999;
}
.global-tooltip.show {
  opacity: 1;
}

/* 每级数值卡片 */
.scaling-tier {
  display: flex; flex-direction: column; align-items: center;
  padding: 4px 8px;
  border: 1px solid rgba(210,173,104,0.12);
  border-radius: 3px;
  background: rgba(0,0,0,0.2);
}
.scaling-tier em {
  display: block;
  font-style: normal;
  font-family: "Cinzel", "Cormorant Garamond", Georgia, serif;
  font-size: 9px; letter-spacing: 0.06em;
  color: var(--text-dim);
  margin-bottom: 3px;
}
.scaling-tier {
  font-family: "Cinzel", "Cormorant Garamond", Georgia, serif;
  font-size: 15px; letter-spacing: 0.04em;
  color: var(--gold-light);
  font-weight: 600;
}

.scaling-section {
  padding: 0 16px 8px;
}
.scaling-row {
  display: flex; gap: 6px; flex-wrap: wrap;
}

/* footer 用 — 紧凑横向 */
.scaling-tier-inline {
  display: inline-flex; align-items: baseline; gap: 2px;
  padding: 2px 6px;
  border: 1px solid rgba(210,173,104,0.1);
  border-radius: 2px;
  background: rgba(0,0,0,0.15);
  vertical-align: middle;
}
.scaling-tier-inline em {
  font-style: normal;
  font-family: "Cinzel", Georgia, serif;
  font-size: 9px; color: var(--text-dim);
  letter-spacing: 0.04em;
}
.scaling-tier-inline {
  font-size: 13px; color: var(--gold-light);
  font-weight: 600;
}

/* 关闭按钮 */
.race-detail-close {
  position: absolute; top: 12px; right: 16px;
  z-index: 2;
  cursor: pointer;
  font-size: 18px; color: var(--text-dim);
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  transition: all 300ms ease;
  line-height: 1;
}
.race-detail-close:hover {
  color: var(--parchment);
  border-color: var(--gold-dark);
}

/* ========== 向导容器 ========== */
.wizard-screen {
  position: fixed; inset: 0; z-index: 55;
  display: none;
  grid-template-columns: 190px 1fr;
  grid-template-rows: 1fr auto;
  background: rgba(10, 5, 2, 0.72);
  backdrop-filter: blur(2px);
}
.wizard-screen.visible { display: grid; }

.wiz-sidebar {
  grid-column: 1; grid-row: 1;
  display: flex; align-items: center;
  padding: 40px 0;
  border-right: 1px solid rgba(210,173,104,0.08);
  background: rgba(10, 5, 2, 0.35);
}
.wiz-steps {
  display: flex; flex-direction: column; align-items: center; gap: 0;
  width: 100%;
}
.wiz-step {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: default;
  transition: all 300ms ease;
}
.wiz-step-num {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(238,224,191,0.12);
  color: rgba(238,224,191,0.3);
  font-family: "Cinzel", Georgia, serif; font-size: 15px;
  transition: all 350ms ease;
}
.wiz-step-label {
  font-family: "Noto Serif SC", serif; font-size: 12px;
  color: rgba(238,224,191,0.25);
  letter-spacing: 0.06em;
  transition: color 350ms ease;
}
.wiz-step.active .wiz-step-num {
  border-color: var(--gold);
  color: var(--gold);
  box-shadow: 0 0 10px var(--gold-glow);
}
.wiz-step.active .wiz-step-label { color: var(--gold); }
.wiz-step.done .wiz-step-num {
  border-color: var(--gold-dark);
  background: rgba(201,162,75,0.1);
  color: var(--gold-dark);
}
.wiz-step.done .wiz-step-label { color: var(--gold-dark); }

.wiz-step-conn {
  width: 1px; height: 36px;
  background: linear-gradient(180deg, transparent, rgba(210,173,104,0.12), transparent);
}

/* 内容区 */
.wiz-content {
  grid-column: 2; grid-row: 1;
  position: relative;
  overflow: hidden;
  padding: 32px 40px;
}
.wiz-panel {
  position: absolute; inset: 0;
  padding: 32px 40px;
  overflow-y: auto;
  display: flex; flex-direction: column; align-items: center;
  opacity: 0; transform: translateX(30px);
  transition: opacity 300ms ease, transform 300ms ease;
  pointer-events: none;
}
.wiz-panel.active {
  opacity: 1; transform: translateX(0);
  pointer-events: auto;
}
.wiz-panel.exit-left {
  opacity: 0; transform: translateX(-30px);
}
.wiz-panel::-webkit-scrollbar { width: 4px; }
.wiz-panel::-webkit-scrollbar-track { background: transparent; }
.wiz-panel::-webkit-scrollbar-thumb { background: rgba(210,173,104,0.12); border-radius: 2px; }

/* 向导占位面板 */
.wiz-placeholder {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; gap: 16px;
}
.wiz-placeholder .wiz-placeholder-title {
  font-family: "Noto Serif SC", serif; font-weight: 600;
  font-size: 28px; color: var(--gold);
}
.wiz-placeholder .wiz-placeholder-sub {
  font-family: "Noto Serif SC", serif;
  font-size: 14px; color: var(--text-dim);
}

/* 导航栏 */
.wiz-nav {
  grid-column: 1 / -1; grid-row: 2;
  display: flex; align-items: center; justify-content: center; gap: 24px;
  padding: 16px 40px;
  border-top: 1px solid rgba(210,173,104,0.1);
}
.wiz-nav-spacer { flex: 1; }
.wiz-nav .entry {
  min-width: 110px; padding: 12px 28px;
  border: 1px solid rgba(210,173,104,0.18);
  border-radius: 3px;
  background: rgba(0,0,0,0.3);
  cursor: pointer; text-align: center;
  transition: all 300ms ease;
}
.wiz-nav .entry:hover {
  border-color: var(--gold);
  background: rgba(201,162,75,0.08);
}
.wiz-nav .entry:active { transform: scale(0.97); }
.wiz-nav .entry.disabled {
  pointer-events: none; opacity: 0.32;
  border-color: rgba(238,224,191,0.06);
}

/* 背景卡片网格 */
.bg-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.bg-card {
  cursor: pointer;
  display: flex; flex-direction: column; gap: 3px;
  padding: 14px 16px;
  border: 1px solid rgba(210,173,104,0.1);
  border-radius: 4px;
  background: rgba(0,0,0,0.2);
  transition: all 250ms ease;
}
.bg-card:hover {
  border-color: rgba(210,173,104,0.3);
  background: rgba(201,162,75,0.05);
}
.bg-card.selected {
  border-color: var(--gold);
  background: rgba(201,162,75,0.1);
  box-shadow: 0 0 12px var(--gold-glow);
}
.bg-card .bg-card-zh {
  font-family: "Noto Serif SC", serif; font-weight: 600;
  font-size: 16px; color: var(--parchment);
}
.bg-card.selected .bg-card-zh { color: var(--gold-light); }
.bg-card .bg-card-en {
  font-family: "Cinzel", Georgia, serif;
  font-size: 10px; color: var(--text-dim);
  letter-spacing: 0.06em;
}
.bg-card .bg-card-stats {
  font-size: 12px; color: var(--gold-dark);
  margin-top: 2px;
}
.bg-card .bg-card-feat {
  font-size: 11px; color: var(--parchment-muted);
}
.bg-card .bg-card-skills {
  font-size: 10px; color: var(--text-dim);
}

/* ============================================
   第 2 步：城市地图 + 场景弹窗
   ============================================ */

/* 地图容器 */
.map-container {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  background:
    url('img/backgroundscene/map.png') no-repeat center center;
  background-size: cover;
  border: 1px solid rgba(210,173,104,0.12);
  border-radius: 6px;
  overflow: hidden;
}

/* 地图标记 — 奇幻地图针式标记 */
.map-hotspot {
  position: absolute;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center;
  gap: 4px;
  transform: translate(-50%, -100%);
  transition: transform 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 2;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.8));
  animation: hotspotBob 4s ease-in-out infinite;
}
.map-hotspot:nth-child(2)  { animation-delay: 0.0s; }
.map-hotspot:nth-child(3)  { animation-delay: 3.2s; }
.map-hotspot:nth-child(4)  { animation-delay: 5.1s; }
.map-hotspot:nth-child(5)  { animation-delay: 7.3s; }
.map-hotspot:nth-child(6)  { animation-delay: 9.0s; }
.map-hotspot:nth-child(7)  { animation-delay: 10.7s; }

.map-hotspot:hover {
  transform: translate(-50%, -100%) scale(1.15);
  animation-play-state: paused;
  z-index: 10;
}

/* 针形标记 — 泪滴/倒三角 + 顶部圆环 */
.map-hotspot .hotspot-dot {
  width: 24px; height: 34px;
  position: relative;
  background:
    radial-gradient(ellipse at 50% 15%, rgba(255,220,140,0.9), rgba(201,162,75,0.5) 40%, rgba(140,100,30,0.3));
  clip-path: polygon(50% 100%, 0% 35%, 18% 0%, 82% 0%, 100% 35%);
  box-shadow:
    0 0 18px rgba(201,162,75,0.55),
    0 0 36px rgba(201,162,75,0.2),
    0 0 54px rgba(201,162,75,0.08);
  transition: all 400ms ease;
}

/* 顶部光点 */
.map-hotspot .hotspot-dot::after {
  content: '';
  position: absolute;
  top: 4px; left: 50%; transform: translateX(-50%);
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.9);
  box-shadow: 0 0 8px rgba(255,255,255,0.6), 0 0 16px rgba(255,220,120,0.5);
  transition: all 400ms ease;
}

/* 外发光环 */
.map-hotspot .hotspot-dot::before {
  content: '';
  position: absolute;
  inset: -12px -8px;
  border-radius: 50%;
  border: 1.5px solid rgba(201,162,75,0.3);
  animation: hotspotPulse 2.5s ease-in-out infinite;
}

.map-hotspot:hover .hotspot-dot {
  background:
    radial-gradient(ellipse at 50% 15%, rgba(255,240,180,1), rgba(224,200,120,0.7) 40%, rgba(180,140,60,0.5));
  box-shadow:
    0 0 24px rgba(201,162,75,0.8),
    0 0 48px rgba(201,162,75,0.35),
    0 0 72px rgba(201,162,75,0.15),
    0 0 96px rgba(201,162,75,0.06);
  filter: brightness(1.3);
}

.map-hotspot:hover .hotspot-dot::after {
  width: 10px; height: 10px;
  box-shadow: 0 0 12px rgba(255,255,255,0.8), 0 0 24px rgba(255,220,120,0.7);
}

/* 地名标签 — 暗色玻璃底 */
.map-hotspot .hotspot-label {
  font-family: "Noto Serif SC", "Source Han Serif SC", serif;
  font-weight: 700;
  font-size: 17px;
  color: var(--parchment);
  letter-spacing: 0.08em;
  text-shadow:
    0 2px 4px rgba(0,0,0,0.9),
    0 0 8px rgba(0,0,0,0.6);
  background: rgba(10,8,4,0.65);
  backdrop-filter: blur(4px);
  padding: 3px 10px 3px 10px;
  border-radius: 3px;
  border: 1px solid rgba(201,162,75,0.15);
  transition: all 300ms ease;
  white-space: nowrap;
}

.map-hotspot:hover .hotspot-label {
  color: var(--gold-light);
  background: rgba(10,8,4,0.85);
  border-color: rgba(201,162,75,0.5);
  text-shadow:
    0 2px 4px rgba(0,0,0,0.9),
    0 0 14px rgba(201,162,75,0.4),
    0 0 24px rgba(201,162,75,0.15);
  box-shadow: 0 0 20px rgba(201,162,75,0.15);
}

/* 已访问状态 — 更亮的金色 */
.map-hotspot.visited .hotspot-dot {
  background:
    radial-gradient(ellipse at 50% 15%, rgba(255,240,170,1), rgba(201,162,75,0.6) 40%, rgba(160,120,40,0.4));
  border-color: var(--gold-light);
  box-shadow:
    0 0 18px rgba(201,162,75,0.7),
    0 0 36px rgba(201,162,75,0.3),
    0 0 54px rgba(201,162,75,0.1);
}

.map-hotspot.visited .hotspot-dot::after {
  background: rgba(255,255,200,1);
  box-shadow: 0 0 8px rgba(255,255,255,0.7), 0 0 16px rgba(255,220,120,0.6);
}

.map-hotspot.visited .hotspot-label {
  color: var(--gold-light);
  border-color: rgba(201,162,75,0.4);
  background: rgba(10,8,4,0.8);
  text-shadow:
    0 2px 4px rgba(0,0,0,0.9),
    0 0 12px rgba(201,162,75,0.4);
}

/* 动画 */
@keyframes hotspotPulse {
  0%, 100% { transform: scale(1); opacity: 0.45; }
  50% { transform: scale(1.6); opacity: 0.08; }
}

@keyframes hotspotBob {
  0%, 100% { transform: translate(-50%, -100%) translateY(0px); }
  25%  { transform: translate(-50%, -100%) translateY(-4px); }
  75%  { transform: translate(-50%, -100%) translateY(2px); }
}

/* 场景弹窗 */
.scene-overlay {
  position: fixed; inset: 0; z-index: 65;
  display: none;
  background: rgba(0,0,0,0.7);
  justify-content: center; align-items: center;
}
.scene-overlay.visible { display: flex; }

.scene-panel {
  width: min(96vw, 1100px);
  max-height: 94vh;
  background: linear-gradient(170deg, #1a1208, #0d0804);
  border: 1px solid rgba(210,173,104,0.22);
  border-radius: 6px;
  display: flex; flex-direction: column;
  overflow: hidden;
  position: relative;
  box-shadow: 0 8px 48px rgba(0,0,0,0.7), 0 0 32px rgba(201,162,75,0.08);
}

.scene-close {
  position: absolute; top: 12px; right: 14px; z-index: 5;
  background: none; border: none;
  color: var(--text-dim); font-size: 20px;
  cursor: pointer;
  transition: color 200ms ease;
}
.scene-close:hover { color: var(--gold); }

/* 场景插图 */
.scene-portrait {
  width: 100%; aspect-ratio: 16 / 8;
  background: rgba(255,255,255,0.02);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
}
.scene-portrait img {
  width: 100%; height: 100%;
  object-fit: cover;
  position: absolute; inset: 0;
}
.scene-portrait-placeholder {
  font-size: 56px; opacity: 0.2;
  z-index: 1;
}

/* 场景内容区 */
.scene-body {
  flex: 1; overflow-y: auto;
  padding: 24px 32px;
}
.scene-title {
  font-family: "Noto Serif SC", serif; font-weight: 600;
  font-size: 24px; color: var(--gold);
  margin: 0 0 18px;
  text-align: center;
  letter-spacing: 0.06em;
}

/* NPC 卡片行 */
.scene-npcs {
  display: flex; gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}

/* NPC 卡片 */
.npc-card {
  cursor: pointer;
  width: 160px;
  padding: 18px 14px;
  border: 1px solid rgba(210,173,104,0.15);
  border-radius: 6px;
  background: linear-gradient(175deg, rgba(15,10,5,0.95), rgba(10,6,3,0.95));
  display: flex; flex-direction: column; align-items: center;
  gap: 4px;
  transition: all 300ms ease;
  position: relative;
}
.npc-card:hover {
  border-color: var(--gold);
  box-shadow: 0 0 18px var(--gold-glow);
  transform: translateY(-3px);
}
.npc-card.active {
  border-color: var(--gold-light);
  box-shadow: 0 0 20px rgba(201,162,75,0.35);
}
.npc-card .npc-zh {
  font-family: "Noto Serif SC", serif; font-weight: 600;
  font-size: 19px; color: var(--parchment);
  letter-spacing: 0.06em;
  transition: color 300ms ease;
}
.npc-card:hover .npc-zh,
.npc-card.active .npc-zh { color: var(--gold-light); }
.npc-card .npc-en {
  font-family: "Cinzel", Georgia, serif;
  font-size: 11px; color: var(--text-dim);
  letter-spacing: 0.06em;
}

/* NPC 详情弹窗 */
.npc-detail-overlay {
  position: fixed; inset: 0; z-index: 70;
  display: none;
  background: rgba(0,0,0,0.75);
  justify-content: center; align-items: center;
}
.npc-detail-overlay.visible { display: flex; }

.npc-detail-modal {
  width: min(94vw, 900px);
  max-height: 92vh;
  overflow-y: auto;
  background: linear-gradient(170deg, #1a1208, #0d0804);
  border: 1px solid rgba(210,173,104,0.22);
  border-radius: 6px;
  box-shadow: 0 8px 48px rgba(0,0,0,0.7), 0 0 32px rgba(201,162,75,0.08);
  position: relative;
}
.npc-detail-modal::-webkit-scrollbar { width: 4px; }
.npc-detail-modal::-webkit-scrollbar-thumb { background: rgba(210,173,104,0.12); border-radius: 2px; }

.npc-detail-close {
  position: absolute; top: 12px; right: 14px; z-index: 5;
  background: none; border: none;
  color: var(--text-dim); font-size: 20px;
  cursor: pointer;
  transition: color 200ms ease;
}
.npc-detail-close:hover { color: var(--gold); }

.npc-detail-inner {
  padding: 36px 40px 32px;
}

.npc-detail-inner .npc-detail-header {
  text-align: center;
  margin-bottom: 18px;
}
.npc-detail-inner .npc-detail-zh {
  display: block;
  font-family: "Noto Serif SC", serif; font-weight: 600;
  font-size: 32px; color: var(--gold);
  letter-spacing: 0.08em;
}
.npc-detail-inner .npc-detail-en {
  display: block;
  font-family: "Cinzel", Georgia, serif;
  font-size: 17px; color: var(--text-dim);
  letter-spacing: 0.1em;
  margin-top: 3px;
}
.npc-detail-inner .npc-detail-desc {
  font-family: "Noto Serif SC", serif;
  font-size: 16px; color: var(--parchment-muted);
  line-height: 1.9;
  text-align: center;
  margin-bottom: 24px;
}
.npc-detail-inner .npc-detail-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}
.npc-detail-inner .npc-detail-item {
  padding: 16px;
  border: 1px solid rgba(210,173,104,0.12);
  border-radius: 4px;
  background: rgba(0,0,0,0.18);
  text-align: center;
}
.npc-detail-inner .npc-detail-item .npc-detail-label {
  display: block;
  font-family: "Noto Serif SC", serif; font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}
.npc-detail-inner .npc-detail-item .npc-detail-value {
  display: block;
  font-family: "Noto Serif SC", serif;
  font-size: 15px; color: var(--parchment);
  line-height: 1.6;
}
.npc-detail-inner .npc-detail-branches {
  text-align: center; color: var(--text-dim);
  font-size: 12px; margin-bottom: 18px;
  line-height: 1.6;
}
.npc-detail-inner .npc-detail-confirm {
  display: block;
  margin: 0 auto;
  padding: 14px 48px;
  border: 1px solid var(--gold);
  border-radius: 4px;
  background: rgba(201,162,75,0.1);
  color: var(--gold);
  font-family: "Noto Serif SC", serif; font-size: 18px;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 300ms ease;
}
.npc-detail-inner .npc-detail-confirm:hover {
  background: rgba(201,162,75,0.22);
  box-shadow: 0 0 20px var(--gold-glow);
}
.npc-detail-inner .npc-detail-confirm.confirmed {
  background: rgba(201,162,75,0.25);
  border-color: var(--gold-light);
  color: var(--gold-light);
  box-shadow: 0 0 16px rgba(201,162,75,0.3);
  pointer-events: none;
}

/* ============================================
   Step 3: 职业选择
   ============================================ */

/* 职业卡片网格 */
.class-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
  max-width: 1060px;
  justify-items: center;
}

/* 职业卡片 */
.class-card {
  cursor: pointer;
  width: 236px; height: 380px;
  border: 1px solid rgba(210,173,104,0.18);
  border-radius: 4px;
  background: linear-gradient(175deg, rgba(10,6,3,0.9), rgba(5,3,1,0.95));
  display: flex; flex-direction: column;
  transition: all 350ms ease;
  position: relative; overflow: hidden;
}
.class-card:hover {
  border-color: var(--gold);
  box-shadow: 0 0 28px var(--gold-glow);
  transform: translateY(-3px);
}
.class-card.selected {
  border-color: var(--gold);
  box-shadow: 0 0 32px var(--gold-glow), inset 0 0 0 1px rgba(201,162,75,0.15);
}

/* 职业卡片 SVG 肖像区 */
.class-card .class-img {
  width: 100%; height: 300px;
  background: rgba(255,255,255,0.02);

  border-bottom: 1px solid rgba(210,173,104,0.1);
}
.class-card .class-img img,
.class-card .class-img svg {
  width: 100%; height: 100%;

  object-fit: cover;
}

/* 职业卡片信息 */
.class-card .class-info {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px;
  padding: 8px 6px;
}
.class-card .class-zh {
  font-family: "Noto Serif SC", "Source Han Serif SC", serif;
  font-weight: 600; font-size: 20px; color: var(--gold);
  letter-spacing: 0.06em;
  transition: color 300ms ease;
}
.class-card .class-en {
  font-family: "Cinzel", "Cormorant Garamond", Georgia, serif;
  font-size: 12px; color: var(--text-dim);
  letter-spacing: 0.08em;
  transition: color 300ms ease;
}
.class-card:hover .class-en { color: var(--parchment-muted); }

/* 职业卡片元数据徽章 */
.class-card .class-meta {
  display: flex; gap: 6px; margin-top: 4px;
}
.class-card .class-meta span {
  font-size: 10px; color: var(--text-dim);
  border: 1px solid rgba(210,173,104,0.14);
  border-radius: 2px; padding: 2px 7px;
  letter-spacing: 0.04em;
}

/* 职业详情分区标题 */
.class-section-title {
  font-family: "Cinzel", "Cormorant Garamond", Georgia, serif;
  font-size: 12px; color: var(--gold-dark);
  letter-spacing: 0.12em;
  margin: 18px 0 8px;
  border-top: 1px solid rgba(210,173,104,0.1);
  padding-top: 14px;
}

/* 起始装备 */
.class-equipment {
  font-size: 13px; color: var(--parchment-muted);
  line-height: 1.7;
  padding: 10px 14px;
  border: 1px solid rgba(210,173,104,0.1);
  border-radius: 3px;
  background: rgba(0,0,0,0.18);
}

/* 确认后按钮状态 */
.class-confirmed {
  border-color: var(--gold-light) !important;
  background: rgba(201,162,75,0.22) !important;
  box-shadow: 0 0 22px var(--gold-glow) !important;
  pointer-events: none;
}



/* 起始装备 — A / B 双卡 */
.equip-options {
  display: flex; gap: 12px; align-items: stretch;
}
.equip-card {
  flex: 1;
  border: 1px solid rgba(210,173,104,0.15);
  border-radius: 4px;
  background: rgba(0,0,0,0.25);

}
.equip-card-label {
  font-family: "Cinzel", Georgia, serif;
  font-size: 14px; font-weight: 700; color: var(--gold);
  padding: 8px 14px 0;
}
.equip-card-items {
  padding: 10px 14px 14px;
  font-size: 13px; color: var(--parchment-muted);
  line-height: 2;
}
.equip-or {
  display: flex; align-items: center;
  font-size: 12px; color: var(--text-dim);
  font-family: "Noto Serif SC", serif;
  flex-shrink: 0;
}

/* 装备物品 — hover 光标提示 */
.equip-card-items .item-name {
  color: var(--parchment-muted);
  cursor: help;
  border-bottom: 1px dotted rgba(210,173,104,0.2);
  transition: color 200ms ease, border-color 200ms ease;
}
.equip-card-items .item-name:hover {
  color: var(--gold-light);
  border-bottom-color: var(--gold);
}

/* 技能名称 — hover 光标提示 */
.skill-name {
  color: var(--parchment-muted);
  cursor: help;
  border-bottom: 1px dotted rgba(210,173,104,0.2);
  transition: color 200ms ease, border-color 200ms ease;
}
.skill-name:hover {
  color: var(--gold-light);
  border-bottom-color: var(--gold);
}

  .race-card .race-en { font-size: 10px; }

  .wiz-nav .entry .sub { font-size: 8px; }

  .race-detail-overlay.visible { align-items: stretch; }

  .race-detail-en { font-size: 12px; }

  .trait-entry .trait-entry-en { font-size: 9px; }

  .race-detail-branches { gap: 6px; }

  .equip-options { flex-direction: column; gap: 8px; }

  .scene-panel { width: 100vw; border-radius: 0; max-height: 100vh; }
  .scene-body { padding: 16px 18px; }
  .scene-title { font-size: 20px; }
  .scene-portrait { aspect-ratio: 16 / 9; }
  .scene-close { top: 8px; right: 10px; font-size: 18px; }

  .npc-card .npc-en { font-size: 10px; }

  .map-container { aspect-ratio: auto; height: 220px; border-radius: 4px; }
  .map-hotspot .hotspot-dot { width: 18px; height: 26px; }

  .trait-popup { width: min(90vw, 360px); }
  .trait-popup-header { padding: 10px 14px 8px; }
  .trait-popup-header .popup-name { font-size: 17px; }
  .trait-popup-header .popup-en { font-size: 10px; }
  .trait-popup-body { padding: 6px 14px 10px; font-size: 12px; line-height: 1.8; }

  .popup-field { font-size: 11px; }
  .trait-popup-footer { padding: 4px 14px 8px; font-size: 10px; }
  .popup-scaling-label { font-size: 10px; }
  .scaling-tier { font-size: 13px; padding: 3px 6px; }

  /* 图标适配 */
  .class-icon-list img { width: 48px; height: 48px; }
  .wiz-placeholder .wiz-placeholder-title { font-size: 22px; }
  .wiz-placeholder .wiz-placeholder-sub { font-size: 12px; }
}

/* 小手机 */
@media (max-width: 480px) {

  .race-card .race-zh { font-size: 14px; }

/* ============================================
   职业详情 — 专属主题色 + 动画背景
   ============================================ */
.race-detail.class-detail {
  --class-theme: #c9a24b;
  --class-theme-bg: #0d0704;
  transition: border-color 600ms ease, box-shadow 600ms ease;
}

.race-detail.class-detail::before {
  content: '';
  position: absolute; inset: 0;
  z-index: 0; pointer-events: none;
  opacity: 0;
  transition: opacity 500ms ease;
  background:
    radial-gradient(ellipse at 20% 25%, var(--class-theme) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 55%, var(--class-theme) 0%, transparent 50%);
}

.race-detail.class-detail.theme-active::before {
  opacity: 0.2;
}

.class-detail .race-detail-portrait {
  transition: background 600ms ease;
}
.class-detail.theme-active .race-detail-portrait {
  background: var(--class-theme-bg);
}

.race-detail.class-detail.theme-active {
  border-color: color-mix(in srgb, var(--class-theme) 35%, transparent);
  box-shadow: 0 0 60px rgba(0,0,0,0.85), 0 0 50px color-mix(in srgb, var(--class-theme) 30%, transparent), 0 0 90px color-mix(in srgb, var(--class-theme) 12%, transparent);
}

.class-detail.theme-active .race-detail-content::-webkit-scrollbar-thumb {
  background: color-mix(in srgb, var(--class-theme) 18%, transparent);
}

.class-detail.theme-active .race-detail-branches .race-branch-pill:hover {
  border-color: var(--class-theme); color: var(--class-theme);
}
.class-detail.theme-active .race-detail-branches .race-branch-pill.selected {
  border-color: var(--class-theme); color: var(--class-theme);
  box-shadow: 0 0 12px color-mix(in srgb, var(--class-theme) 20%, transparent);
}

.class-detail .race-detail-confirm {
  transition: background 400ms ease, border-color 400ms ease, box-shadow 400ms ease;
}
.class-detail.theme-active .race-detail-confirm {
  background: color-mix(in srgb, var(--class-theme) 14%, transparent);
  border-color: color-mix(in srgb, var(--class-theme) 45%, transparent);
}
.class-detail.theme-active .race-detail-confirm:hover {
  background: color-mix(in srgb, var(--class-theme) 24%, transparent);
  border-color: var(--class-theme);
  box-shadow: 0 0 26px color-mix(in srgb, var(--class-theme) 30%, transparent);
}

.class-detail.theme-active .trait-dot {
  background: var(--class-theme) !important;
}
.class-detail.theme-active .trait-entry-name {
  transition: color 300ms ease;
}
.class-detail.theme-active .trait-entry:hover .trait-entry-name {
  color: var(--class-theme);
}

.class-detail .class-section-title {
  transition: border-color 500ms ease, color 500ms ease;
}
.class-detail.theme-active .class-section-title {
  border-top-color: color-mix(in srgb, var(--class-theme) 22%, transparent);
  color: var(--class-theme);
}

.class-detail .class-equipment {
  transition: border-color 500ms ease;
}
.class-detail.theme-active .class-equipment {
  border-color: color-mix(in srgb, var(--class-theme) 18%, transparent);

.class-detail .race-detail-meta span {
  transition: border-color 500ms ease, color 500ms ease;
}
.class-detail.theme-active .race-detail-meta span {
  border-color: color-mix(in srgb, var(--class-theme) 25%, transparent);
}

.class-detail .race-detail-zh {

<script>
const bgs = [
  "url('img/bg/bg-01.png')",
  "url('img/bg/bg-02.png')",
  "url('img/bg/bg-03.png')",
  "url('img/bg/bg-04.png')",
  "url('img/bg/bg-05.png')",
  "url('img/bg/bg-06.png')",
  "url('img/bg/bg-07.png')",
];
let bgIdx = 0;
document.body.style.backgroundImage = bgs[0];

const dotsEl = document.getElementById('dots');
for (let i = 0; i < bgs.length; i++) {
  const dot = document.createElement('span');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dotsEl.appendChild(dot);
}

function switchBg() {
  bgIdx = (bgIdx + 1) % bgs.length;
  document.body.style.backgroundImage = bgs[bgIdx];
  dotsEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === bgIdx));
}

document.getElementById('btnBgSwitch').addEventListener('click', switchBg);

let bgTimer = setInterval(switchBg, 8000);
let bgPlaying = true;

const btnPause = document.getElementById('btnBgPause');
btnPause.addEventListener('click', () => {
  if (bgPlaying) {
    clearInterval(bgTimer);
    btnPause.textContent = '▷ 播放';
  } else {
    bgTimer = setInterval(switchBg, 8000);
    btnPause.textContent = '|| 暂停';
  }
  bgPlaying = !bgPlaying;
});

const entriesMain = document.getElementById('entriesMain');
const subOptions = document.getElementById('subOptions');
const bgDim = document.getElementById('bgDim');
const bgSwitcher = document.querySelector('.bg-switcher');

document.getElementById('btnStart').addEventListener('click', () => {
  entriesMain.style.display = 'none';
  subOptions.classList.add('visible');
  bgDim.classList.add('visible');
});

document.getElementById('btnLoad').addEventListener('click', () => console.log('读取存档'));

document.getElementById('subBack').addEventListener('click', () => {
  entriesMain.style.display = '';
  subOptions.classList.remove('visible');
  bgDim.classList.remove('visible');
});

const raceScreen = document.getElementById('raceScreen');
const wizardScreen = document.getElementById('wizardScreen');

document.getElementById('optWizard').addEventListener('click', () => {
  subOptions.classList.remove('visible');
  wizardScreen.classList.add('visible');
  bgDim.classList.add('visible');
  bgSwitcher.style.top = '12px';
  bgSwitcher.style.bottom = 'auto';
  wizardState.currentStep = 1;
  renderStep1();
  updateStepIndicator();
  updateNavButtons();
});

// ESC 关闭向导回到子选项
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && wizardScreen.classList.contains('visible') && !detailOverlay.classList.contains('visible') && !sceneOverlay.classList.contains('visible')) {
    wizardScreen.classList.remove('visible');
    bgDim.classList.remove('visible');
    bgSwitcher.style.top = '';
    bgSwitcher.style.bottom = '';
    subOptions.classList.add('visible');
  }
});

document.getElementById('optQuick').addEventListener('click', () => console.log('快速开始'));

document.getElementById('raceBack').addEventListener('click', () => {
  raceScreen.classList.remove('visible');
  subOptions.classList.add('visible');
});

// ========== 向导逻辑 ==========
const wizContent = document.getElementById('wizContent');
const wizSteps = document.getElementById('wizSteps');
const btnWizPrev = document.getElementById('btnWizPrev');
const btnWizNext = document.getElementById('btnWizNext');

function updateStepIndicator() {
  const steps = wizSteps.querySelectorAll('.wiz-step');
  steps.forEach(s => {
    const n = parseInt(s.dataset.step);
    s.classList.remove('active', 'done');
    if (n === wizardState.currentStep) s.classList.add('active');
    else if (n < wizardState.currentStep) s.classList.add('done');
  });
}

function updateNavButtons() {
  const cs = wizardState.currentStep;
  // 上一步
  if (cs === 1) {
    btnWizPrev.style.visibility = 'hidden';
  } else {
    btnWizPrev.style.visibility = '';
    btnWizPrev.querySelector('.zh').textContent = '上一步';
  }
  // 下一步
  if (cs === 6) {
    btnWizNext.querySelector('.zh').textContent = '锁定创建';
    if (!wizardState.steps[6].locked) btnWizNext.classList.add('disabled');
  } else {
    btnWizNext.querySelector('.zh').textContent = '下一步';
    // 校验当前步
    var ok = stepRegistry[cs] && stepRegistry[cs].validate ? stepRegistry[cs].validate() : true;
    btnWizNext.classList.toggle('disabled', !ok);
  }
}

const stepRegistry = {
  1: { render: renderStep1, validate: function() { return wizardState.steps[1].raceId !== null; } },
  2: { render: renderStep2, validate: function() { return wizardState.steps[2].backgroundId !== null; } },
  3: { render: renderStep3, validate: function() { return wizardState.steps[3].classId !== null; } },
  4: { render: renderPlaceholder, validate: null },
  5: { render: renderPlaceholder, validate: null },
  6: { render: renderPlaceholder, validate: null }
};

function navigateToStep(targetStep) {
  if (isTransitioning) return;
  if (targetStep < 1 || targetStep > 6) return;

  // 前进校验
  if (targetStep > wizardState.currentStep) {
    var reg = stepRegistry[wizardState.currentStep];
    if (reg && reg.validate && !reg.validate()) {
      // shake feedback
      btnWizNext.style.transform = 'translateX(-4px)';
      setTimeout(function() { btnWizNext.style.transform = ''; }, 150);
      return;
    }
  }

  isTransitioning = true;
  var oldPanel = wizContent.querySelector('.wiz-panel.active');
  var newPanel = wizContent.querySelector('.wiz-panel[data-panel="' + targetStep + '"]');
  var dir = targetStep > wizardState.currentStep ? 'forward' : 'back';

  if (oldPanel && newPanel) {
    if (dir === 'forward') {
      oldPanel.classList.add('exit-left');
      oldPanel.classList.remove('active');
    } else {
      oldPanel.classList.remove('active');
    }
    setTimeout(function() {
      if (oldPanel) oldPanel.classList.remove('exit-left');
      newPanel.classList.add('active');
      wizardState.currentStep = targetStep;
      // 渲染目标步
      var reg2 = stepRegistry[targetStep];
      if (reg2 && reg2.render) reg2.render();
      updateStepIndicator();
      updateNavButtons();
      isTransitioning = false;
    }, 300);
  }
}

btnWizPrev.addEventListener('click', function() {
  if (wizardState.currentStep > 1) {
    playSfx(sfx.back);
    navigateToStep(wizardState.currentStep - 1);
  }
});

btnWizNext.addEventListener('click', function() {
  if (btnWizNext.classList.contains('disabled')) return;
  playSfx(sfx.transition);
  if (wizardState.currentStep < 6) {
    navigateToStep(wizardState.currentStep + 1);
  } else {
    // 确认锁定
    wizardState.steps[6].locked = true;
    updateNavButtons();
    playSfx(sfx.select);
  }
});

// ========== step 1: 种族选择 ==========
function renderStep1() {
  var panel = document.getElementById('wizPanel1');
  var raceIds = Object.keys(raceData);
  var html = '<div class="race-header">' +
    '<span class="race-title zh">选择种族</span>' +
    '<span class="race-title sub">CHOOSE YOUR ANCESTRY</span>' +
    '<div class="race-line"></div>' +
    '</div>';
  html += '<div class="race-grid">';
  raceIds.forEach(function(id) {
    var r = raceData[id];
    var sel = wizardState.steps[1].raceId === id ? ' selected' : '';
    html += '<div class="race-card' + sel + '" data-race="' + id + '">';
    html += '<div class="race-img"><img src="img/race-cards/' + id + '.png" alt="' + r.zh + '"></div>';
    html += '<div class="race-info"><span class="race-zh">' + r.zh + '</span><span class="race-en">' + r.en + '</span></div>';
    html += '</div>';
  });
  html += '</div>';

  panel.innerHTML = html;

  panel.querySelectorAll('.race-card').forEach(function(card) {
    card.addEventListener('click', function() {
      var raceId = card.dataset.race;
      document.querySelectorAll('.race-card').forEach(function(c) { c.classList.remove('selected'); });
      card.classList.add('selected');
      if (typeof openRaceDetail === 'function') openRaceDetail(raceId);
    });
  });
}

// ========== step 2: 城市地图选背景 ==========
function clearBackgroundSelection() {
  wizardState.steps[2].backgroundId = null;
  updateNavButtons();
  updateStepIndicator();
  renderStep2();
}

function renderStep2() {
  var panel = document.getElementById('wizPanel2');
  var currentBg = wizardState.steps[2].backgroundId;
  var html = '<div style="margin-bottom:16px;text-align:center;">' +
    '<h2 style="font-family:\'Noto Serif SC\',serif;color:var(--gold);margin:0 0 4px;">选择背景</h2>' +
    '<p style="font-family:\'Noto Serif SC\',serif;color:var(--text-dim);margin:0;font-size:13px;">探索城市，寻找属于你的身份</p>' +
    '</div>';
  html += '<div class="map-container" id="mapContainer" style="position:relative;">';
  html += '<div class="map-debug-coords" id="mapDebugCoords" style="display:none;position:absolute;z-index:10;pointer-events:none;font-size:11px;color:var(--gold);background:rgba(0,0,0,0.8);padding:3px 7px;border-radius:3px;border:1px solid rgba(210,173,104,0.3);white-space:nowrap;"></div>';

  mapLocations.forEach(function(loc) {
    var hasVisited = currentBg && loc.backgrounds.indexOf(currentBg) !== -1;
    var cls = hasVisited ? ' visited' : '';
    var labelHtml = loc.zh;
    if (hasVisited && currentBg) {
      var visitedBg = backgroundData[currentBg];
      if (visitedBg) labelHtml = '✓ ' + loc.zh + ' · <span style="color:var(--gold);">' + visitedBg.zh + '</span>';
    }
    html += '<div class="map-hotspot' + cls + '" data-loc="' + loc.id + '" style="left:' + loc.x + '%;top:' + loc.y + '%;">' +
      '<div class="hotspot-dot"></div>' +
      '<span class="hotspot-label">' + labelHtml + '</span>' +
      '</div>';
  });
  html += '</div>';

  // 已选身份状态条（地图下方，不挤压地图）
  if (currentBg && backgroundData[currentBg]) {
    var selBg = backgroundData[currentBg];
    html += '<div style="text-align:center;margin-top:12px;">' +
      '<span style="display:inline-block;background:rgba(201,162,75,0.12);border:1px solid var(--gold);color:var(--gold-light);padding:6px 18px;border-radius:4px;font-family:\'Noto Serif SC\',serif;font-size:14px;letter-spacing:1px;">' +
      '已选身份：<span style="font-weight:700;">' + selBg.zh + '</span>' +
      '<span style="color:var(--parchment-muted);font-size:11px;margin-left:6px;">' + selBg.en + '</span></span>' +
      '<button onclick="clearBackgroundSelection()" style="margin-left:10px;font-size:11px;background:none;border:1px solid var(--text-dim);color:var(--text-dim);padding:5px 10px;border-radius:3px;cursor:pointer;font-family:inherit;">重新选择</button>' +
    '</div>';
  }
  panel.innerHTML = html;

  // 调试模式：点击地图空白处输出坐标
  var mapContainer = document.getElementById('mapContainer');
  var debugCoords = document.getElementById('mapDebugCoords');

  mapContainer.addEventListener('click', function(e) {
    if (e.target.closest('.map-hotspot')) return; // 不拦截标记点击
    var rect = mapContainer.getBoundingClientRect();
    var x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
    var y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
    console.log('地图坐标: x:' + x + '%, y:' + y + '%');
    debugCoords.textContent = 'x:' + x + '% y:' + y + '% (已复制)';
    debugCoords.style.display = '';
    debugCoords.style.left = (parseFloat(x) + 2) + '%';
    debugCoords.style.top = (parseFloat(y) - 1) + '%';
    // 复制到剪贴板
    if (navigator.clipboard) {
      navigator.clipboard.writeText('x: ' + x + ', y: ' + y);
    }
    setTimeout(function() { debugCoords.style.display = 'none'; }, 2000);
  });

  // 鼠标移动时显示坐标
  mapContainer.addEventListener('mousemove', function(e) {
    if (e.target.closest('.map-hotspot')) { debugCoords.style.display = 'none'; return; }
    var rect = mapContainer.getBoundingClientRect();
    var x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
    var y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
    debugCoords.textContent = 'x:' + x + '% y:' + y + '%';
    debugCoords.style.display = '';
    debugCoords.style.left = (parseFloat(x) + 2) + '%';
    debugCoords.style.top = (parseFloat(y) - 1) + '%';
    debugCoords.style.opacity = '0.75';
  });
  mapContainer.addEventListener('mouseleave', function() {
    debugCoords.style.display = 'none';
  });

  // 事件委托：地图标记点击
  panel.querySelectorAll('.map-hotspot').forEach(function(hs) {
    hs.addEventListener('click', function() {
      var locId = hs.dataset.loc;
      playSfx(sfx.select);
      openScene(locId);
    });
  });
}

// ========== 场景弹窗逻辑 ==========
var sceneOverlay = document.getElementById('sceneOverlay');
var sceneClose = document.getElementById('sceneClose');
var sceneImg = document.getElementById('sceneImg');
var sceneTitle = document.getElementById('sceneTitle');
var sceneNpcs = document.getElementById('sceneNpcs');

function openScene(locId) {
  var loc = mapLocations.find(function(l) { return l.id === locId; });
  if (!loc) return;

  sceneTitle.textContent = loc.zh;
  sceneImg.src = loc.sceneImg;
  sceneImg.onerror = function() {
    sceneImg.style.display = 'none';
    sceneImg.parentElement.querySelector('.scene-portrait-placeholder').style.display = '';
  };
  sceneImg.onload = function() {
    sceneImg.style.display = 'block';
    sceneImg.parentElement.querySelector('.scene-portrait-placeholder').style.display = 'none';
  };

  var currentBg = wizardState.steps[2].backgroundId;
  var html = '';
  loc.backgrounds.forEach(function(bgId) {
    var bg = backgroundData[bgId];
    if (!bg) return;
    var cls = currentBg === bgId ? ' active' : '';
    html += '<div class="npc-card' + cls + '" data-bg="' + bgId + '">' +
      '<span class="npc-zh">' + bg.zh + '</span>' +
      '<span class="npc-en">' + bg.en + '</span>' +
      (currentBg === bgId ? '<span style="position:absolute;top:4px;right:8px;color:var(--gold-light);font-size:12px;">✓</span>' : '') +
      '</div>';
  });
  sceneNpcs.innerHTML = html;

  // NPC 卡片点击 → 打开详情弹窗
  sceneNpcs.querySelectorAll('.npc-card').forEach(function(card) {
    card.addEventListener('click', function() {
      var bgId = card.dataset.bg;
      playSfx(sfx.select);
      openNpcDetail(bgId);
    });
  });

  sceneOverlay.classList.add('visible');
}

function closeScene() {
  sceneOverlay.classList.remove('visible');
}

sceneClose.addEventListener('click', closeScene);
sceneOverlay.addEventListener('click', function(e) {
  if (e.target === sceneOverlay) closeScene();
});

// ========== NPC 详情弹窗 ==========
var npcDetailOverlay = document.getElementById('npcDetailOverlay');
var npcDetailClose = document.getElementById('npcDetailClose');
var npcDetailInner = document.getElementById('npcDetailInner');

function openNpcDetail(bgId) {
  var bg = backgroundData[bgId];
  if (!bg) return;
  var alreadyConfirmed = wizardState.steps[2].backgroundId === bgId;

  var html = '<div class="npc-detail-header">' +
    '<span class="npc-detail-zh">' + bg.zh + '</span>' +
    '<span class="npc-detail-en">' + bg.en + '</span>' +
    '</div>' +
    '<p class="npc-detail-desc">' + bg.desc + '</p>' +
    '<div class="npc-detail-grid">' +
      '<div class="npc-detail-item"><span class="npc-detail-label">属性加值</span><span class="npc-detail-value" style="color:var(--gold-light);">' + bg.abilities + '</span><span class="npc-detail-label" style="margin-top:3px;">任选其一：+2/+1 或 +1/+1/+1</span></div>' +
      '<div class="npc-detail-item"><span class="npc-detail-label">起源专长</span><span class="npc-detail-value">' + bg.feat + '</span></div>' +
      '<div class="npc-detail-item"><span class="npc-detail-label">技能熟练</span><span class="npc-detail-value">' + wrapSkillNames(bg.skills) + '</span></div>' +
      '<div class="npc-detail-item"><span class="npc-detail-label">工具熟练</span><span class="npc-detail-value">' + (bg.tools || '—') + '</span></div>' +
      '<div class="npc-detail-item" style="grid-column: span 2;"><span class="npc-detail-label">起始装备</span><span class="npc-detail-value" style="font-size:12px;">' + wrapItemNames(bg.equipment) + '</span></div>' +
    '</div>' +
    '<button class="npc-detail-confirm' + (alreadyConfirmed ? ' confirmed' : '') + '" id="npcDetailConfirm">' +
      (alreadyConfirmed ? '✓ 已选定此背景' : '选定此背景') +
    '</button>';

  npcDetailInner.innerHTML = html;
  wireItemHovers(npcDetailInner);
  wireSkillHovers(npcDetailInner);
  npcDetailOverlay.classList.add('visible');

  // 确认按钮
  var confirmBtn = document.getElementById('npcDetailConfirm');
  if (confirmBtn && !alreadyConfirmed) {
    confirmBtn.addEventListener('click', function() {
      wizardState.steps[2].backgroundId = bgId;
      playSfx(sfx.select);
      // 先关闭两层弹窗，让用户立刻看到地图反馈
      closeNpcDetail();
      if (sceneOverlay.classList.contains('visible')) closeScene();
      // 刷新地图标记和状态条
      renderStep2();
      updateNavButtons();
      updateStepIndicator();
    });
  }
}

function closeNpcDetail() {
  npcDetailOverlay.classList.remove('visible');
}

npcDetailClose.addEventListener('click', closeNpcDetail);
npcDetailOverlay.addEventListener('click', function(e) {
  if (e.target === npcDetailOverlay) closeNpcDetail();
});

// ESC 优先关 NPC 弹窗，再关场景
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (npcDetailOverlay.classList.contains('visible')) {
      closeNpcDetail();
    } else if (sceneOverlay.classList.contains('visible')) {
      closeScene();
    }
  }
});

var classIconMap = {
  barbarian: '野蛮人.png', bard: 'bard.png', cleric: '牧师.png', druid: '德鲁伊.png',
  fighter: '展示.png', monk: '武僧.png', paladin: '圣武士.png', ranger: 'ranger.png',
  rogue: '游荡.png', sorcerer: '术士.png', warlock: 'warlock.png', wizard: '法师.png'
};

function renderStep3() {
  var panel = document.getElementById('wizPanel3');

// ========== 音频 ==========
const bgm = document.getElementById('bgm');
// Web Audio API 合成音效 — 卷积混响 · 暗黑奇幻质感（无需外部文件）
// 音效设计：Diablo / Darkest Dungeon 风格
//   hover  → 魔法晶尘闪烁（高频粒子群）
//   click  → 木质杖柄叩击石板（三层叠加）
//   select → 青铜钟鸣 C大调和弦（泛音列 + 石室混响）
//   trans  → 羊皮卷轴展卷（噪声扫频 + 低频隆隆 + 窸窣）
//   back   → 轻步后退（足踏石板 + 重心后移）

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _audioCtx = null;
function _ctx() {
  if (!_audioCtx) _audioCtx = new AudioCtx();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

// 噪声缓冲（复用）
var _noiseBuf = null;
function _noise(ctx, dur) {
  if (!_noiseBuf || _noiseBuf.duration < dur) {
    var len = ctx.sampleRate * dur;
    _noiseBuf = ctx.createBuffer(1, len, ctx.sampleRate);
    var dd = _noiseBuf.getChannelData(0);
    for (var i = 0; i < len; i++) dd[i] = Math.random() * 2 - 1;
  }
  var s = ctx.createBufferSource();
  s.buffer = _noiseBuf;
  return s;
}

// ─── 共享卷积混响引擎 ───
// 程序化生成脉冲响应：指数衰减噪声模拟石室混响（无需外部 IR 文件）
var _reverb = null;
function _getReverb(ctx) {
  if (!_reverb) {
    var dur = 1.4;        // 脉冲响应时长 (s)
    var rt60 = 0.65;      // RT60 混响时间 (s) — 中小型石室

    var sr = ctx.sampleRate;
    var len = Math.floor(sr * dur);
    var irBuf = ctx.createBuffer(2, len, sr);
    var decayFactor = Math.log(1000) / rt60;

    // 立体声 IR：指数衰减噪底 + 早期离散反射
    for (var ch = 0; ch < 2; ch++) {
      var data = irBuf.getChannelData(ch);
      for (var i = 0; i < len; i++) {
        var t = i / sr;
        data[i] = (Math.random() * 2 - 1) * Math.exp(-decayFactor * t);
      }
      // 叠加早期反射伪影
      var erTimes = [0.005, 0.012, 0.021, 0.032];
      for (var j = 0; j < erTimes.length; j++) {
        var ei = Math.floor(erTimes[j] * sr);
        if (ei < len) data[ei] += (Math.random() * 2 - 1) * (0.4 - j * 0.09);
      }
    }

    var convolver = ctx.createConvolver();
    convolver.buffer = irBuf;
    var wetGain = ctx.createGain();
    wetGain.gain.value = 0.28; // 全局湿信号比例

    convolver.connect(wetGain);
    wetGain.connect(ctx.destination);

    _reverb = { input: convolver, wet: wetGain };
  }
  return _reverb;
}

// ─── 辅助：源信号 → 干输出 + 湿发送 ───
function _out(ctx, srcGain, reverbSend) {
  srcGain.connect(ctx.destination);                       // 干信号
  var rev = _getReverb(ctx);
  var send = ctx.createGain();
  send.gain.value = reverbSend != null ? reverbSend : 0.25;
  srcGain.connect(send);
  send.connect(rev.input);                               // 湿信号发送
}

let audioOn = true;
bgm.volume = 0.35;

const sfx = {
  // • hover — 魔法晶尘：4~7 颗高频正弦粒子，随机音高微错位
  hover: function() {
    if (!audioOn) return;
    var ctx = _ctx(), t = ctx.currentTime;
    var numGrains = 4 + Math.floor(Math.random() * 3);
    for (var i = 0; i < numGrains; i++) {
      var start = t + i * 0.01 + Math.random() * 0.01;
      var freq = 4200 + Math.random() * 4800;
      var dur = 0.018 + Math.random() * 0.035;

      var o = ctx.createOscillator();
      var og = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(freq, start);
      o.frequency.setValueAtTime(freq * (0.95 + Math.random() * 0.1), start + 0.003);

      og.gain.setValueAtTime(0.001, start);
      og.gain.linearRampToValueAtTime(0.025 + Math.random() * 0.025, start + 0.003);
      og.gain.exponentialRampToValueAtTime(0.001, start + dur);

      o.connect(og);
      _out(ctx, og, 0.1);
      o.start(start); o.stop(start + dur);
    }
  },

  // • click — 杖叩石板：冲击噪声 + 木质腔体正弦 + 泛音
  click: function() {
    if (!audioOn) return;
    var ctx = _ctx(), t = ctx.currentTime;

    // Layer 1: 冲击噪音 — 杖尖击石瞬间
    var n = _noise(ctx, 0.08);
    var lp = ctx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(3200, t);
    lp.frequency.exponentialRampToValueAtTime(160, t + 0.028);
    lp.Q.setValueAtTime(0.55, t);
    var ng = ctx.createGain();
    ng.gain.setValueAtTime(0.14, t);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.075);
    n.connect(lp); lp.connect(ng);
    _out(ctx, ng, 0.07);
    n.start(t); n.stop(t + 0.08);

    // Layer 2: 木质腔体共振 — 正弦快速下弯
    var o1 = ctx.createOscillator(), o1g = ctx.createGain();
    o1.type = 'sine';
    o1.frequency.setValueAtTime(192, t);
    o1.frequency.exponentialRampToValueAtTime(62, t + 0.038);
    o1g.gain.setValueAtTime(0.08, t);
    o1g.gain.exponentialRampToValueAtTime(0.001, t + 0.056);
    o1.connect(o1g);
    _out(ctx, o1g, 0.05);
    o1.start(t); o1.stop(t + 0.056);

    // Layer 3: 木质泛音列
    var o2 = ctx.createOscillator(), o2g = ctx.createGain();
    o2.type = 'sine';
    o2.frequency.setValueAtTime(385, t);
    o2.frequency.exponentialRampToValueAtTime(135, t + 0.026);
    o2g.gain.setValueAtTime(0.022, t);
    o2g.gain.exponentialRampToValueAtTime(0.001, t + 0.035);
    o2.connect(o2g);
    _out(ctx, o2g, 0.03);
    o2.start(t); o2.stop(t + 0.035);
  },

  // • select — 青铜钟鸣：C 大三和弦琶音 + 泛音列 + 石室混响
  select: function() {
    if (!audioOn) return;
    var ctx = _ctx(), t = ctx.currentTime;

    var notes = [
      { freq: 523.25, delay: 0.00 },  // C5
      { freq: 659.25, delay: 0.07 },  // E5
      { freq: 783.99, delay: 0.14 }   // G5
    ];

    notes.forEach(function(note) {
      var d = t + note.delay;

      // 基音
      var o1 = ctx.createOscillator(), o1g = ctx.createGain();
      o1.type = 'sine';
      o1.frequency.setValueAtTime(note.freq, d);
      o1g.gain.setValueAtTime(0.001, d);
      o1g.gain.linearRampToValueAtTime(0.068, d + 0.012);
      o1g.gain.exponentialRampToValueAtTime(0.001, d + 0.62);
      o1.connect(o1g);
      _out(ctx, o1g, 0.55);
      o1.start(d); o1.stop(d + 0.62);

      // 2 倍泛音（钟的固有泛音）
      var o2 = ctx.createOscillator(), o2g = ctx.createGain();
      o2.type = 'sine';
      o2.frequency.setValueAtTime(note.freq * 2.0, d);
      o2g.gain.setValueAtTime(0.001, d);
      o2g.gain.linearRampToValueAtTime(0.023, d + 0.008);
      o2g.gain.exponentialRampToValueAtTime(0.001, d + 0.35);
      o2.connect(o2g);
      _out(ctx, o2g, 0.35);
      o2.start(d); o2.stop(d + 0.35);

      // 失谐 3 倍泛音 — 创造钟鸣的"嗡"感
      var o3 = ctx.createOscillator(), o3g = ctx.createGain();
      o3.type = 'sine';
      o3.frequency.setValueAtTime(note.freq * 3.01 - 10, d);
      o3g.gain.setValueAtTime(0.001, d);
      o3g.gain.linearRampToValueAtTime(0.007, d + 0.006);
      o3g.gain.exponentialRampToValueAtTime(0.001, d + 0.18);
      o3.connect(o3g);
      _out(ctx, o3g, 0.22);
      o3.start(d); o3.stop(d + 0.18);
    });

    // 钟槌击打噪点 — 高 Q 带通瞬态
    var mn = _noise(ctx, 0.09);
    var mbp = ctx.createBiquadFilter();
    mbp.type = 'bandpass';
    mbp.frequency.setValueAtTime(4800, t + 0.03);
    mbp.Q.setValueAtTime(24, t + 0.03);
    var mg = ctx.createGain();
    mg.gain.setValueAtTime(0.001, t + 0.03);
    mg.gain.linearRampToValueAtTime(0.018, t + 0.035);
    mg.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
    mn.connect(mbp); mbp.connect(mg);
    _out(ctx, mg, 0.4);
    mn.start(t + 0.03); mn.stop(t + 0.09);
  },

  // • transition — 羊皮卷轴展卷：噪声扫频 + 低频隆隆 + 不规则窸窣
  transition: function() {
    if (!audioOn) return;
    var ctx = _ctx(), t = ctx.currentTime;

    // Layer 1: 纸卷展声 — 带通噪声上扫
    var n1 = _noise(ctx, 0.36);
    var bp1 = ctx.createBiquadFilter();
    bp1.type = 'bandpass';
    bp1.frequency.setValueAtTime(280, t);
    bp1.frequency.exponentialRampToValueAtTime(2500, t + 0.22);
    bp1.Q.setValueAtTime(2.0, t);
    var g1 = ctx.createGain();
    g1.gain.setValueAtTime(0.001, t);
    g1.gain.linearRampToValueAtTime(0.092, t + 0.04);
    g1.gain.setValueAtTime(0.092, t + 0.18);
    g1.gain.exponentialRampToValueAtTime(0.001, t + 0.36);
    n1.connect(bp1); bp1.connect(g1);
    _out(ctx, g1, 0.3);
    n1.start(t); n1.stop(t + 0.36);

    // Layer 2: 深沉隆隆 — 三角波低频体感
    var o = ctx.createOscillator(), og = ctx.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(76, t + 0.04);
    o.frequency.linearRampToValueAtTime(132, t + 0.26);
    og.gain.setValueAtTime(0.001, t + 0.04);
    og.gain.linearRampToValueAtTime(0.045, t + 0.07);
    og.gain.exponentialRampToValueAtTime(0.001, t + 0.34);
    o.connect(og);
    _out(ctx, og, 0.25);
    o.start(t + 0.04); o.stop(t + 0.34);

    // Layer 3: 羊皮窸窣 — 高通噪声 + 不规则包络模拟纸张起皱
    var n3 = _noise(ctx, 0.24);
    var hp3 = ctx.createBiquadFilter();
    hp3.type = 'highpass';
    hp3.frequency.setValueAtTime(2800, t + 0.06);
    var g3 = ctx.createGain();
    g3.gain.setValueAtTime(0.001, t + 0.06);
    g3.gain.linearRampToValueAtTime(0.018, t + 0.066);
    // 包络抖动 → 纸质纹理
    g3.gain.setValueAtTime(0.009, t + 0.09);
    g3.gain.linearRampToValueAtTime(0.026, t + 0.095);
    g3.gain.setValueAtTime(0.006, t + 0.12);
    g3.gain.linearRampToValueAtTime(0.021, t + 0.125);
    g3.gain.setValueAtTime(0.004, t + 0.15);
    g3.gain.linearRampToValueAtTime(0.015, t + 0.155);
    g3.gain.exponentialRampToValueAtTime(0.001, t + 0.24);
    n3.connect(hp3); hp3.connect(g3);
    _out(ctx, g3, 0.18);
    n3.start(t + 0.06); n3.stop(t + 0.24);
  },

  // • back — 轻步后退：低频闷响 + 低音下弯 + 鞋底轻擦
  back: function() {
    if (!audioOn) return;
    var ctx = _ctx(), t = ctx.currentTime;

    // Layer 1: 足踏石板 — 低沉噪声
    var n = _noise(ctx, 0.12);
    var lp = ctx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(400, t);
    lp.frequency.exponentialRampToValueAtTime(85, t + 0.07);
    lp.Q.setValueAtTime(0.45, t);
    var ng = ctx.createGain();
    ng.gain.setValueAtTime(0.001, t);
    ng.gain.linearRampToValueAtTime(0.06, t + 0.016);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    n.connect(lp); lp.connect(ng);
    _out(ctx, ng, 0.1);
    n.start(t); n.stop(t + 0.12);

    // Layer 2: 重心后移 — 正弦下弯
    var o = ctx.createOscillator(), og = ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(142, t);
    o.frequency.exponentialRampToValueAtTime(68, t + 0.09);
    og.gain.setValueAtTime(0.001, t);
    og.gain.linearRampToValueAtTime(0.048, t + 0.012);
    og.gain.exponentialRampToValueAtTime(0.001, t + 0.11);
    o.connect(og);
    _out(ctx, og, 0.08);
    o.start(t); o.stop(t + 0.11);

    // Layer 3: 鞋底轻擦 — 极微高频
    var sn = _noise(ctx, 0.07);
    var shp = ctx.createBiquadFilter();
    shp.type = 'highpass';
    shp.frequency.setValueAtTime(2200, t + 0.02);
    var sg = ctx.createGain();
    sg.gain.setValueAtTime(0.001, t + 0.02);
    sg.gain.linearRampToValueAtTime(0.006, t + 0.026);
    sg.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
    sn.connect(shp); shp.connect(sg);
    _out(ctx, sg, 0.05);
    sn.start(t + 0.02); sn.stop(t + 0.07);
  }
};

function playSfx(fn) {
  if (!audioOn || !fn) return;
  fn();
}

function fadeInBgm() {
  if (!audioOn) return;
  bgm.volume = 0;
  bgm.play().catch(() => {});
  let v = 0;
  const fade = setInterval(() => {
    v += 0.03;
    if (v >= 0.35) { bgm.volume = 0.35; clearInterval(fade); }
    else bgm.volume = v;
  }, 80);
}

  audioOn = !audioOn;
  btnAudio.textContent = audioOn ? '\u{1F50A}' : '\u{1F507}';
  btnAudio.classList.toggle('muted', !audioOn);
  if (!audioOn) {
    bgm.pause();
  } else {
    bgm.play().catch(() => {});
  }
});

// 全局：将文本中的已知物品名包装为带 hover 的 span
function wrapItemNames(text) {
  var result = text;
  var known = Object.keys(itemData).sort(function(a, b) { return b.length - a.length; });
  known.forEach(function(k) {
    result = result.split(k).join('<span class="item-name" data-item="' + k + '">' + k + '</span>');
  });
  return result;
}

function showSkillInfo(skillName, anchorEl) {
  var s = skillData[skillName];
  if (!s) { hideSkillPopup(); return; }
  var html = '<div class="trait-popup">';
  html += '<div class="trait-popup-header"><div class="popup-name">' + skillName + '<span class="popup-type-tag tag-passive">' + s.ability + '</span></div><div class="popup-en">' + s.en + '</div></div>';
  html += '<div class="trait-popup-divider"></div>';
  html += '<div class="trait-popup-body">' + s.desc + '</div>';
  html += '</div>';
  globalTooltip.innerHTML = html;
  positionTooltip(anchorEl);
}
function wrapSkillNames(text) {
  var result = text;
  var known = Object.keys(skillData).sort(function(a, b) { return b.length - a.length; });
  known.forEach(function(k) {
    result = result.split(k).join('<span class="skill-name" data-skill="' + k + '">' + k + '</span>');
  });
  return result;
}
function wireSkillHovers(container) {
  if (!container) return;
  container.querySelectorAll('.skill-name').forEach(function(el) {
    el.addEventListener('mouseenter', function() { showSkillInfo(el.dataset.skill, el); });
    el.addEventListener('mouseleave', hideSkillPopup);
  });
}
function showItemPopup(itemName, anchorEl) {

// ========== 全局 Skill Popup（BG3 风格，body 级不受 overflow 裁切） ==========
const globalTooltip = document.getElementById('globalTooltip');

function showSkillPopup(trait, anchorEl) {
  const type = trait.type || (trait.action ? 'active' : 'passive');
  const typeLabels = { passive: '被动特性', active: '主动能力', spell: '法术', feat: '专长' };

  let html = '<div class="trait-popup">';

  // 头部：名称 + 类型标签
  html += '<div class="trait-popup-header">';
  html += '<div class="popup-name">' + trait.name;
  html += '<span class="popup-type-tag tag-' + type + '">' + (typeLabels[type] || '') + '</span>';
  html += '</div>';

  // 英文名
  html += '<div class="popup-en">' + trait.nameEn + '</div>';

  // 法术：环位 + 学派
  if (type === 'spell' && (trait.level || trait.school)) {
    html += '<div class="trait-popup-fields">';
    if (trait.level) html += '<div class="popup-field"><span class="popup-field-label">环位</span><span class="popup-field-value">' + trait.level + '</span></div>';
    if (trait.school) html += '<div class="popup-field"><span class="popup-field-label">学派</span><span class="popup-field-value">' + trait.school + '</span></div>';
    html += '</div>';
  }

  // 主动 / 法术：属性字段行
  if (type === 'active' || type === 'spell') {
    const fields = [];
    if (trait.action)   fields.push(['动作', trait.action]);
    if (trait.usage)    fields.push(['消耗', trait.usage]);
    if (trait.unlock)   fields.push(['解锁', trait.unlock + ' 起']);
    if (trait.range)    fields.push(['范围', trait.range]);
    if (trait.duration) fields.push(['时长', trait.duration]);
    if (trait.components) fields.push(['成分', trait.components]);
    if (trait.save)     fields.push(['豁免', trait.save]);
    if (trait.attack)   fields.push(['攻击', trait.attack]);
    if (trait.concentration) fields.push(['专注', '是']);
    if (fields.length) {
      html += '<div class="trait-popup-fields">';
      fields.forEach(function(f) {
        html += '<div class="popup-field"><span class="popup-field-label">' + f[0] + '</span><span class="popup-field-value">' + f[1] + '</span></div>';
      });
      html += '</div>';
    }
  }

  html += '<div class="trait-popup-divider"></div>';

  // 描述正文
  html += '<div class="trait-popup-body">' + trait.desc + '</div>';

  // 等级成长表
  if (trait.scaling) {
    html += '<div class="scaling-section">';
    html += '<div class="popup-scaling-label">' + (trait.scalingLabel || '伤害成长') + '</div>';
    html += '<div class="scaling-row">';
    var parts = trait.scaling.split('|');
    for (var i = 0; i < parts.length; i += 2) {
      html += '<span class="scaling-tier"><em>' + parts[i] + '</em>' + parts[i + 1] + '</span>';
    }
    html += '</div></div>';
  }

  // 脚注
  if (trait.footer) {
    html += '<div class="trait-popup-footer">' + trait.footer + '</div>';
  }

  html += '</div>';

  globalTooltip.innerHTML = html;

  positionTooltip(anchorEl);
}

function positionTooltip(anchorEl) {
  var rect = anchorEl.getBoundingClientRect();
  var w = globalTooltip.offsetWidth;
  var h = globalTooltip.offsetHeight;
  var vw = window.innerWidth;
  var vh = window.innerHeight;
  var spaceRight = vw - rect.right - 8;
  var spaceLeft = rect.left - 8;
  var spaceBelow = vh - rect.bottom - 8;
  if (spaceRight >= w + 8) {
    globalTooltip.style.left = (rect.right + 8) + 'px';
    globalTooltip.style.top = (rect.top + rect.height / 2) + 'px';
    globalTooltip.style.transform = 'translate(0, -50%)';
  } else if (spaceLeft >= w + 8) {
    globalTooltip.style.left = (rect.left - 8) + 'px';
    globalTooltip.style.top = (rect.top + rect.height / 2) + 'px';
    globalTooltip.style.transform = 'translate(-100%, -50%)';
  } else if (spaceBelow >= h + 8) {
    globalTooltip.style.top = (rect.bottom + 8) + 'px';
    globalTooltip.style.left = (rect.left + rect.width / 2) + 'px';
    globalTooltip.style.transform = 'translate(-50%, 0)';
  } else {
    globalTooltip.style.top = (rect.top - 8) + 'px';
    globalTooltip.style.left = (rect.left + rect.width / 2) + 'px';
    globalTooltip.style.transform = 'translate(-50%, -100%)';
  }
  var tr = globalTooltip.getBoundingClientRect();
  if (tr.right > vw - 4) { globalTooltip.style.left = (parseFloat(globalTooltip.style.left) - (tr.right - vw + 4)) + 'px'; tr = globalTooltip.getBoundingClientRect(); }
  if (tr.left < 4) { globalTooltip.style.left = (parseFloat(globalTooltip.style.left) + (4 - tr.left)) + 'px'; tr = globalTooltip.getBoundingClientRect(); }
  if (tr.bottom > vh - 4) { globalTooltip.style.top = (parseFloat(globalTooltip.style.top) - (tr.bottom - vh + 4)) + 'px'; }
  if (tr.top < 4) { globalTooltip.style.top = (parseFloat(globalTooltip.style.top) + (4 - tr.top)) + 'px'; }
  globalTooltip.classList.add('show');
}

function hideSkillPopup() {
  globalTooltip.classList.remove('show');
}
