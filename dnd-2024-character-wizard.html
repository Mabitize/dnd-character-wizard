const placeholderEl = detailPortrait.querySelector('.portrait-placeholder');

let detailOpenRace = null; // 当前详情面板展示的种族 id
let detailMode = null; // 'race' | 'class'

function openRaceDetail(raceId) {
  const data = raceData[raceId];
  if (!data) return;

  detailMode = 'race';
  detailOpenRace = raceId;

  // 清理职业主题样式（如有）
  var detail = detailOverlay.querySelector('.race-detail');
  if (detail) {
    detail.classList.remove('class-detail', 'theme-active');
    detail.style.removeProperty('--class-theme');
    detail.style.removeProperty('--class-theme-bg');
  }

  // 立绘
  const imgSrc = 'img/race/' + raceId + '.png';
  detailImg.src = imgSrc;
  detailImg.style.display = '';
  detailImg.onerror = function() {
    detailImg.style.display = 'none';
    if (racePortraitSvgs[raceId]) {
      detailSvg.innerHTML = racePortraitSvgs[raceId];
      detailSvg.style.display = '';
    }
  };
  detailImg.onload = function() {
    detailSvg.style.display = 'none';
    if (placeholderEl) placeholderEl.style.display = 'none';
  };
  // 先尝试显示SVG作为初始占位，如果图片加载成功则切换
  if (racePortraitSvgs[raceId]) {
    detailSvg.innerHTML = racePortraitSvgs[raceId];
    detailSvg.style.display = '';
    detailImg.style.display = 'none';
    // 尝试加载图片
    var testImg = new Image();
    testImg.onload = function() {
      detailImg.style.display = '';
      detailSvg.style.display = 'none';
      if (placeholderEl) placeholderEl.style.display = 'none';
    };
    testImg.onerror = function() {
      detailImg.style.display = 'none';
      detailSvg.style.display = '';
      if (placeholderEl) placeholderEl.style.display = 'none';
    };
    testImg.src = imgSrc;
  }

  // 辅助函数：获取当前选中分支
  function getSelectedBranch() {
    const selectedPill = detailContent.querySelector('.race-branch-pill.selected');
    return selectedPill ? selectedPill.dataset.branch : null;
  }

  // 辅助函数：获取当前选中龙种颜色
  function getSelectedColorData() {
    const branch = getSelectedBranch();
    if (!branch || !data.branches) return null;
    const branchOpt = data.branches.options.find(o => o.id === branch);
    if (!branchOpt || !branchOpt.colors) return null;
    const colorPill = detailContent.querySelector('.race-color-pill.selected');
    if (colorPill) {
      const colorId = colorPill.dataset.color;
      return branchOpt.colors.find(c => c.id === colorId) || branchOpt.colors[0];
    }
    return branchOpt.colors[0];
  }

  // 辅助函数：渲染龙种颜色 pills
  function renderColorPills() {
    const container = detailContent.querySelector('.race-color-pills');
    if (!container) return;
    const branch = getSelectedBranch();
    if (!branch || !data.branches) return;
    const branchOpt = data.branches.options.find(o => o.id === branch);
    if (!branchOpt || !branchOpt.colors) { container.innerHTML = ''; return; }

    let pillsHtml = '';
    branchOpt.colors.forEach((c, i) => {
      pillsHtml += '<span class="race-color-pill' + (i === 0 ? ' selected' : '') + '" data-color="' + c.id + '">';
      pillsHtml += c.label + '<span class="damage-tag">' + c.damage + '</span>';
      pillsHtml += '</span>';
    });
    container.innerHTML = pillsHtml;

    // 绑定颜色 pill 事件
    container.querySelectorAll('.race-color-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        container.querySelectorAll('.race-color-pill').forEach(p => p.classList.remove('selected'));
        pill.classList.add('selected');
        playSfx(sfx.click);
        renderTraits();
      });
    });
  }

  // 辅助函数：渲染特性列表（含分支联动 + 龙种占位替换）
  function renderTraits() {
    const section = detailContent.querySelector('.race-detail-section');
    if (!section) return;

    let traitsHtml = '<div class="race-detail-section-title">ANCESTRAL TRAITS</div>';

    let traits = [];
    if (data.commonTraits) {
      traits = traits.concat(data.commonTraits);
      const branch = getSelectedBranch();
      if (branch && data.branchTraits && data.branchTraits[branch]) {
        traits = traits.concat(data.branchTraits[branch]);
      }
    } else if (data.traits) {
      traits = data.traits;
    }

    // 龙种颜色占位符替换
    const colorData = getSelectedColorData();

    traits.forEach((t, i) => {
      let name = t.name;
      let en = t.en;
      let desc = t.desc;
      let footer = t.footer || '';
      if (colorData) {
        name = name.replace(/\{damage\}/g, colorData.damage).replace(/\{enDamage\}/g, colorData.enDamage);
        en   = en.replace(/\{damage\}/g, colorData.damage).replace(/\{enDamage\}/g, colorData.enDamage);
        desc = desc.replace(/\{damage\}/g, colorData.damage).replace(/\{enDamage\}/g, colorData.enDamage).replace(/\{colorLabel\}/g, colorData.label);
        if (!footer && t.en && t.en.toLowerCase().indexOf('breath') !== -1) {
          const branch = getSelectedBranch();
          const branchLabel = branch === 'chromatic' ? '彩色龙' : '金属龙';
          footer = '当前选择：' + branchLabel + ' · ' + colorData.label + ' · ' + colorData.damage;
        }
      }
      // 保存解析后的数据到元素（含全部属性字段）
      const traitJson = JSON.stringify({
        type: t.type || '',
        sub: t.sub || false,
        name: name,
        nameEn: en,
        level: t.level || '',
        school: t.school || '',
        action: t.action || '',
        usage: t.usage || '',
        unlock: t.unlock || '',
        range: t.range || '',
        duration: t.duration || '',
        components: t.components || '',
        save: t.save || '',
        attack: t.attack || '',
        concentration: t.concentration || false,
        desc: desc,
        scaling: t.scaling || '',
        footer: footer
      }).replace(/"/g, '&quot;');
      traitsHtml += '<div class="trait-entry' + (t.sub ? ' sub' : '') + '" data-trait="' + traitJson + '">';
      traitsHtml += '<span class="trait-dot"></span>';
      traitsHtml += '<span class="trait-entry-name">' + name + '</span>';
      if (t.unlock) traitsHtml += '<span class="trait-unlock-badge">' + t.unlock + '</span>';
      traitsHtml += '<span class="trait-entry-en">' + en + '</span>';
      traitsHtml += '</div>';
    });

    section.innerHTML = traitsHtml;

    // 绑定 hover — BG3 风格弹出卡
    section.querySelectorAll('.trait-entry').forEach(el => {
      el.addEventListener('mouseenter', () => {
        const traitData = JSON.parse(el.dataset.trait.replace(/&quot;/g, '"'));
        showSkillPopup(traitData, el);
      });
      el.addEventListener('mouseleave', hideSkillPopup);
    });
  }

  // 构建内容
  let html = '';

  // 头部
  html += '<div class="race-detail-zh">' + data.zh + '</div>';
  html += '<div class="race-detail-en">' + data.en + '</div>';
  html += '<div class="race-detail-meta">';
  html += '<span>' + data.type + '</span>';
  html += '<span>' + data.size + '</span>';
  html += '<span>' + data.speed + '</span>';
  html += '</div>';

  // 风味简介
  html += '<div class="race-detail-flavor">' + data.flavor + '</div>';

  // 分支选择
  if (data.branches) {
    html += '<div class="race-detail-branches" data-branch-id="' + data.branches.id + '">';
    data.branches.options.forEach((opt, i) => {
      html += '<div class="race-branch-pill' + (i === 0 ? ' selected' : '') + '" data-branch="' + opt.id + '">' + opt.label + '</div>';
    });
    html += '</div>';
    // 龙种颜色选择区（仅有 colors 的种族使用）
    html += '<div class="race-color-pills"></div>';
  }

  // 特性列表（占位，由 renderTraits 填充）
  html += '<div class="race-detail-section"></div>';

  // 确认按钮
  html += '<button class="race-detail-confirm" id="raceDetailConfirm">确认选择</button>';

  detailContent.innerHTML = html;

  // 填充龙种颜色 + 特性
  if (data.branches) renderColorPills();
  renderTraits();

  // 绑定分支 pill 事件 — 切换时重渲染颜色 + 特性
  detailContent.querySelectorAll('.race-branch-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      const parent = pill.parentElement;
      parent.querySelectorAll('.race-branch-pill').forEach(p => p.classList.remove('selected'));
      pill.classList.add('selected');
      playSfx(sfx.click);
      renderColorPills();
      renderTraits();
    });
  });

  // 绑定确认按钮
  const confirmBtn = document.getElementById('raceDetailConfirm');
  if (confirmBtn) {
    confirmBtn.addEventListener('click', () => {
      selectedRace = raceId;
      // 读取分支和颜色选择
      const branchPill = detailContent.querySelector('.race-branch-pill.selected');
      const branch = branchPill ? branchPill.dataset.branch : null;
      const colorPill = detailContent.querySelector('.race-color-pill.selected');
      const color = colorPill ? colorPill.dataset.color : null;
      // 写入 wizardState
      wizardState.steps[1] = { raceId: raceId, branch: branch, color: color };
      // 同步所有种族卡片（包括向导面板内的）
      document.querySelectorAll('.race-card').forEach(c => c.classList.remove('selected'));
      var cards = document.querySelectorAll('.race-card[data-race="' + raceId + '"]');
      cards.forEach(function(c) { c.classList.add('selected'); });
      playSfx(sfx.select);
      closeRaceDetail();
      // 更新向导按钮
      updateNavButtons();
      updateStepIndicator();
    });
  }

  // 显示
  detailOverlay.classList.add('visible');
}

function closeRaceDetail() {
  var detail = detailOverlay.querySelector('.race-detail');
  if (detail) {
    detail.classList.remove('class-detail', 'theme-active');
    detail.style.removeProperty('--class-theme');
    detail.style.removeProperty('--class-theme-bg');
  }
  detailOverlay.classList.remove('visible');
  detailOpenRace = null;
  detailMode = null;
}

// 关闭按钮
document.getElementById('raceDetailClose').addEventListener('click', () => {
  playSfx(sfx.back);
  closeRaceDetail();
  updateNavButtons();
});

// 点击遮罩关闭
detailOverlay.addEventListener('click', (e) => {
  if (e.target === detailOverlay) {
    playSfx(sfx.back);
    closeRaceDetail();
    updateNavButtons();
  }
});

// ESC 关闭
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && detailOverlay.classList.contains('visible')) {
    playSfx(sfx.back);
    closeRaceDetail();
    updateNavButtons();
  }
});

// ========== 种族卡片点击 → 打开详情 ==========
document.querySelectorAll('.race-card').forEach(card => {
  card.addEventListener('click', () => {
    const raceId = card.dataset.race;
    document.querySelectorAll('.race-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedRace = raceId;
    playSfx(sfx.select);
    openRaceDetail(raceId);
  });
});
</script>
